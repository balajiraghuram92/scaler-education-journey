version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=StudyTracker;User Id=sa;Password=YourStrongPassw0rd;TrustServerCertificate=True
    depends_on:
      - sqlserver

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrongPassw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
